name: Atualizar Dashboard da Pedra
on:
  schedule:
    - cron: '0 */2 * * *' # 12x ao dia
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configurar R
        uses: r-lib/actions/setup-r@v2

      - name: Instalar Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Instalar Chromium e dependências de sistema
        run: sudo apt-get install -y chromium-browser

      - name: Instalar dependências do sistema Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libxml2-dev libssl-dev libfontconfig1-dev

      # - name: Instalar Dependências do R
      #   run: |
      #     install.packages(c("rvest", "dplyr", "plotly", "tidyr", "lubridate","here")
      #   shell: Rscript {0}

      - name: Instalar dependências com Cache
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache: true
          packages: |
            any::dplyr
            any::rvest
            any::plotly
            any::here
            any::tidyr
            any::lubridate
            any::ggplot2
            

      - name: Rodar Scraping
        run: Rscript chesf_data.R # Gera o CSV novo com os 36.38%

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          # O segredo está aqui: dizemos para o Quarto NÃO renderizar de novo, 
          # mas usar os arquivos que já geramos no passo anterior.
          render: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Salvar CSV atualizado na Main (Opcional)
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/pedra_dados.csv
          git commit -m "Dados atualizados: $(date)" || exit 0
          git push origin main
