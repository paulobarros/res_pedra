name: Atualizar Dashboard da Pedra
on:
  schedule:
    - cron: '0 */4 * * *' # 6x ao dia
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configurar R
        uses: r-lib/actions/setup-r@v2

      - name: Instalar Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Instalar Chromium e dependências de sistema
        run: sudo apt-get install -y chromium-browser

      - name: Instalar dependências do sistema Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libxml2-dev libssl-dev

      - name: Instalar Dependências do R
        run: |
          install.packages(c("rvest", "tidyverse", "plotly", "glue", "fontawesome"))
        shell: Rscript {0}

      - name: Rodar Scraping e Renderizar Dashboard
        run: |
          Rscript chesf_data.R # Atualiza o data/pedra_hoje.csv
          quarto render index.qmd       # Gera o novo index.html na pasta docs/

      - name: Commit e Push dos arquivos atualizados
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/pedra_hoje.csv docs/
          git commit -m "Auto-update Dashboard: $(date)" || exit 0
          git push